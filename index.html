<!DOCTYPE html>
<html>
<head>
<title>Dino Mobile Clean</title>
<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
text-align:center;
background:#eee;
}

canvas{
display:block;
background:white;
}

#btns{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

button{
padding:12px 16px;
font-size:14px;
border:none;
border-radius:10px;
background:black;
color:white;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="btns">
<button onclick="startGame()">START</button>
<button onclick="jump()">JUMP</button>
<button onclick="nextSkin()">GANTI SKIN</button>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=200;

/* SKIN (PAKAI PNG TRANSPARAN) */
let skins=[
{name:"Dino", img:"assets/dino.png"},
{name:"Kucing", img:"assets/kucing.png"},
{name:"Robot", img:"assets/robot.png"}
];

let skinImages=[];

/* LOAD GAMBAR */
skins.forEach((s,i)=>{
let img=new Image();
img.src=s.img;
skinImages[i]=img;
});

let currentSkin=0;

/* PLAYER */
let dino={
x:50,
y:150,
dy:0,
gravity:0.6,
jump:-12,
grounded:true
};

/* OBSTACLE */
let obs={
x:canvas.width,
y:150,
w:20,
h:40,
speed:6
};

/* GAME */
let state="menu";
let score=0;
let coins=0;

/* START */
function startGame(){
state="play";
score=0;
obs.x=canvas.width;
}

/* JUMP */
function jump(){
if(state==="play" && dino.grounded){
dino.dy=dino.jump;
dino.grounded=false;
}
}

/* GANTI SKIN */
function nextSkin(){
currentSkin++;
if(currentSkin>=skins.length) currentSkin=0;
}

/* UPDATE */
function update(){
if(state!=="play") return;

dino.y+=dino.dy;
dino.dy+=dino.gravity;

if(dino.y>=150){
dino.y=150;
dino.dy=0;
dino.grounded=true;
}

obs.x-=obs.speed;

if(obs.x<-20){
obs.x=canvas.width+Math.random()*200;
score++;
coins++;
}

/* COLLISION */
if(
dino.x<obs.x+20 &&
dino.x+40>obs.x &&
dino.y<obs.y+40 &&
dino.y+40>obs.y
){
state="gameover";
}
}

/* DRAW */
function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

/* PLAYER (GAMBAR PNG) */
let img=skinImages[currentSkin];

if(img && img.complete){
ctx.drawImage(img,dino.x,dino.y,40,40);
}else{
ctx.fillStyle="black";
ctx.fillRect(dino.x,dino.y,40,40);
}

/* OBSTACLE */
ctx.fillStyle="green";
ctx.fillRect(obs.x,obs.y,20,40);

/* UI */
ctx.fillStyle="black";
ctx.fillText("Score: "+score,10,20);
ctx.fillText("Coin: "+coins,10,40);
ctx.fillText("Skin: "+skins[currentSkin].name,10,60);

/* MENU */
if(state==="menu"){
ctx.fillText("TEKAN START",150,100);
}

/* GAME OVER */
if(state==="gameover"){
ctx.fillText("GAME OVER",150,100);
}
}

/* LOOP */
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();

/* TAP LAYAR = LOMPAT */
canvas.addEventListener("touchstart", ()=>{
jump();
});
</script>

</body>
</html>
